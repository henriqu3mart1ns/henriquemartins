<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parte 5</title>
</head>
<body>
    <script>
        // Dobrar Valores (map):

        let arr1 = [1,2,3,4,5];
        let dobro = arr1.map(n => n * 2);
        console.log(dobro);

        // Filtrar Números Pares (filter):

        let arr2 = [10,15,20,25,30];
        let pares = arr2.filter(n => n % 2 === 0);
        console.log(pares);

        //Ordenação (sort):

        let arr3 = [5,1,9,3,7];
        arr3.sort((a, b) => a - b);
        console.log(arr3);

        //Encadeando Métodos:

        let arr4 = [2,5,8,11,14];
        let resultado = arr4
        .filter(n => n > 5)
        .map(n => n * 2);

        console.log(resultado);

    </script>

    
</body>
</html>
